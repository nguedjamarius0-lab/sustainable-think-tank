{% extends "base.html" %}
{% block title %}Erreur serveur - Tendereo{% endblock %}
{% block content %}
<section class="section" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background: var(--light-bg);">
    <div style="text-align: center; padding: 2rem;">
        <h1 style="font-size: 6rem; font-weight: 800; color: var(--error); margin-bottom: 1rem;">500</h1>
        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem;">Erreur serveur</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem; max-width: 400px; margin-left: auto; margin-right: auto;">
            Une erreur interne s'est produite. Nous travaillons à résoudre le problème.
        </p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary">
            <i class="fas fa-home"></i> Retour à l'accueil
        </a>
    </div>
</section>
{% endblock %}
