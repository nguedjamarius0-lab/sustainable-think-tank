services:
  - type: web
    name: by-nguedjamarius
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && python seed.py && gunicorn flask_app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: by-nguedjamarius-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FLASK_APP
        value: flask_app:app
      - key: FLASK_CONFIG
        value: production
      - key: DONATION_URL
        sync: false
      - key: ADMIN_REG_CODE
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: WEB_CONCURRENCY
        value: "1"

databases:
  - name: by-nguedjamarius-db
    plan: free
    databaseName: by_nguedjamarius
