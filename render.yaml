services:
  - type: web
    name: tendereo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && gunicorn flask_app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tendereo-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FLASK_APP
        value: flask_app:app
      - key: FLASK_CONFIG
        value: production
    databases:
      - name: tendereo-db
        plan: free
        databaseName: tendereo
